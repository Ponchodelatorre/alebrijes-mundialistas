<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alebrijes Mundialistas - Powered by My Project</title>
    <style>
        :root { 
            --primary: #fb923c; --bg: #0f172a; --card-front: #1e293b; 
            --success: #10b981; --danger: #ef4444; --bonus: #8b5cf6; --premium: #f59e0b;
        }
        body, html {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg); color: white; margin: 0; padding: 0;
            width: 100vw; height: 100vh; overflow: hidden; box-sizing: border-box;
            display: flex; flex-direction: column;
        }
        /* ... (Mantuve todos tus estilos CSS tal cual los tenías) ... */
        .top-nav { width: 100%; height: 40px; background-color: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; flex-shrink: 0; }
        .nav-buttons { display: flex; gap: 8px; }
        .nav-buttons button { background: #334155; border: 1px solid #4b5563; color: #cbd5e1; font-size: 0.65rem; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .nav-buttons button:hover { background: var(--primary); color: #0f172a; border-color: var(--primary); }
        .bottom-footer { width: 100%; height: 45px; background-color: #0f172a; border-top: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; font-size: 0.7rem; color: #9ca3af; flex-shrink: 0; }
        .main-container { flex-grow: 1; width: 100%; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background-color: #1e293b; border: 2px solid var(--primary); border-radius: 12px; padding: 20px; width: 90%; max-width: 450px; }
        .close-btn { position: absolute; right: 15px; top: 10px; color: #9ca3af; font-size: 1.5rem; cursor: pointer; }
        /* Añade aquí el resto de tu CSS original... */
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-buttons">
            <button onclick="showModal('modal-rules')">📖 Reglas</button>
            <button onclick="showModal('modal-methodology')">📊 Metodología</button>
            <button onclick="showModal('modal-offset')">🌱 Compensar</button>
        </div>
        <button type="button" id="voiceToggle" class="voice-btn" onclick="toggleMute()">🔊 Voz: ON</button>
    </nav>

    <div class="main-container">
        </div>

    <script src="datos.js"></script>
    <script>
        let activePlayers = []; 
        let totalSecondsGame = 0;
        let globalTimerInterval;
        let currentTurnIndex = 0;
        let roundCounter = 1;
        // ... (resto de tus variables y funciones) ...
        
        // Función para mostrar modales
        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        // ... (Toda tu lógica JS aquí) ...

        window.onload = function() { 
            console.log("Juego cargado correctamente.");
        };
    </script>
</body>
</html>
