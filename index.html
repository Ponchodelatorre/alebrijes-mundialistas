<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alebrijes Mundialistas</title>
    <script src="datos.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #fb923c; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>Alebrijes Mundialistas</h1>
    <p>Motor cargado. Haz clic para iniciar:</p>
    
    <button onclick="startTimer()">Iniciar Juego</button>

    <div id="game-display" style="margin-top: 30px;"></div>

    <script>
        // ESTA ES LA FUNCIÓN QUE FALTABA
        function startTimer() {
            console.log("Iniciando timer...");
            // Verificamos si los datos cargaron
            if (typeof bancoPreguntas !== 'undefined') {
                document.getElementById('game-display').innerHTML = 
                    "<h2>¡Juego Iniciado!</h2>" +
                    "<p>Primera pregunta: " + bancoPreguntas.base[0].q + "</p>";
            } else {
                alert("Error: datos.js no cargado");
            }
        }
    </script>
</body>
</html>
