<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alebrijes Mundialistas PRO</title>
    <script src="datos.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid #fb923c; width: 80%; max-width: 500px; }
        button { padding: 15px 30px; margin-top: 20px; background: #fb923c; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Alebrijes Mundialistas</h1>
        <div id="ui-area">
            <button onclick="iniciarJuego()">¡Comenzar Torneo!</button>
        </div>
    </div>

    <script>
        let index = 0;
        let preguntas = bancoPreguntas.base; // Aquí puedes cambiar a .legend o .ocean

        function iniciarJuego() {
            renderizarPregunta();
        }

        function renderizarPregunta() {
            if (index >= preguntas.length) {
                mostrarDashboard();
                return;
            }
            let p = preguntas[index];
            document.getElementById('ui-area').innerHTML = `
                <div class="card">
                    <h3>${p.cat} (Nivel ${p.lvl})</h3>
                    <p style="font-size: 22px;">${p.q}</p>
                    <button onclick="siguiente()">Ver Respuesta: ${p.a}</button>
                </div>
                <p>Pregunta ${index + 1} de ${preguntas.length}</p>
            `;
        }

        function siguiente() {
            index++;
            renderizarPregunta();
        }

        function mostrarDashboard() {
            document.getElementById('game-container').innerHTML = `
                <div class="card">
                    <h1>¡Torneo Finalizado!</h1>
                    <p>Has completado el banco de preguntas.</p>
                    <button onclick="window.print()">Descargar Certificado</button>
                    <br><button onclick="location.reload()">Jugar de nuevo</button>
                </div>
            `;
        }
    </script>
</body>
</html>
