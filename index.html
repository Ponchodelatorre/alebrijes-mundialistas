<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test de Alebrijes</title>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 50px; }
        .btn-test { padding: 30px; font-size: 25px; background: #fb923c; cursor: pointer; border-radius: 15px; border: none; }
    </style>
</head>
<body>

    <h1 id="titulo">Esperando tu clic...</h1>
    <button class="btn-test" onclick="probar()">Haz clic aquí</button>

    <script>
        function probar() {
            document.getElementById('titulo').innerText = "¡EL CÓDIGO SÍ FUNCIONA!";
            document.body.style.backgroundColor = "green";
        }
    </script>
</body>
</html>
