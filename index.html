<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alebrijes Mundialistas</title>
    <script src="datos.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .btn-test { padding: 20px; font-size: 20px; background: #fb923c; border: none; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="pantalla">
        <h1>¡Bienvenido a Alebrijes!</h1>
        <p>Motor cargado correctamente.</p>
        <button class="btn-test" onclick="iniciarJuego()">Iniciar Juego</button>
    </div>

    <script>
        function iniciarJuego() {
            // Verificamos si los datos existen
            if (typeof bancoPreguntas !== 'undefined') {
                document.getElementById('pantalla').innerHTML = `
                    <h1>¡Juego Iniciado!</h1>
                    <p>Total de preguntas base: ${bancoPreguntas.base.length}</p>
                    <p>La primera pregunta es: ${bancoPreguntas.base[0].q}</p>
                `;
            } else {
                alert("Error: datos.js no cargado");
            }
        }
    </script>
</body>
</html>
