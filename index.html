<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test de Alebrijes</title>
    <script src="datos.js"></script>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px;
        }
        .debug-box { 
            border: 2px solid #fb923c; 
            padding: 20px; 
            border-radius: 10px; 
        }
    </style>
</head>
<body>

    <div class="debug-box">
        <h1>Estado del Sistema:</h1>
        <div id="test-output">Cargando...</div>
    </div>

    <script>
        // Esta función se ejecuta sola al abrir la página
        window.onload = function() {
            let output = document.getElementById('test-output');
            
            // Verificamos si los datos de datos.js están presentes
            if (typeof bancoPreguntas !== 'undefined') {
                output.innerHTML = `
                    <p style="color: green;">✅ Base de datos detectada.</p>
                    <p>Total de preguntas base: ${bancoPreguntas.base.length}</p>
                    <p>Primera pregunta: <b>${bancoPreguntas.base[0].q}</b></p>
                `;
            } else {
                output.innerHTML = `<p style="color: red;">❌ Error: datos.js no está cargando.</p>`;
            }
        };
    </script>
</body>
</html>
