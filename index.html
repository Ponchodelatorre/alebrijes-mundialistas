<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alebrijes Mundialistas PRO</title>
    <script src="datos.js?v=999"></script> <style>
        :root { --primary: #fb923c; --bg: #0f172a; --card: #1e293b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .branding { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .branding img { height: 60px; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); width: 90%; max-width: 600px; margin: 20px auto; }
        #timer { font-size: 3em; color: var(--primary); font-weight: bold; }
        button { padding: 15px 30px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="branding">
        <img src="logo_24FO_bco_h.png" alt="Together for the Ocean" onerror="this.style.display='none'">
        <img src="My Project Logo.png" alt="My Project" onerror="this.style.display='none'">
    </div>

    <div id="game-container">
        <h1>Alebrijes Mundialistas</h1>
        <div id="ui-area">
            <button onclick="iniciarJuego()">¡Comenzar Torneo!</button>
        </div>
    </div>

    <script>
        let index = 0, score = 0, timeLeft = 15, timer;
        let preguntas = bancoPreguntas.base;

        function iniciarJuego() { renderizarPregunta(); }

        function startTimer() {
            timeLeft = 15;
            document.getElementById('timer').innerText = timeLeft;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timer); revelarRespuesta(); }
            }, 1000);
        }

        function renderizarPregunta() {
            if (index >= preguntas.length) { mostrarDashboard(); return; }
            let p = preguntas[index];
            document.getElementById('game-container').innerHTML = `
                <div class="card">
                    <p>Puntos actuales: ${score}</p>
                    <div id="timer">15</div>
                    <h3>${p.cat} (Nivel ${p.lvl})</h3>
                    <p style="font-size: 24px;">${p.q}</p>
                    <button id="btn-res" onclick="revelarRespuesta()">Ver Respuesta</button>
                    <div id="res-box" style="display:none; margin-top:20px;">
                        <p style="font-size:22px; color:var(--primary); font-weight:bold;">${p.a}</p>
                        <button onclick="siguiente()">Siguiente Pregunta</button>
                    </div>
                </div>
                <p>Pregunta ${index + 1} de ${preguntas.length}</p>
            `;
            startTimer();
        }

        function revelarRespuesta() {
            clearInterval(timer);
            document.getElementById('btn-res').style.display = 'none';
            document.getElementById('res-box').style.display = 'block';
            score += (timeLeft * 10);
        }

        function siguiente() { index++; renderizarPregunta(); }

        function mostrarDashboard() {
            document.getElementById('game-container').innerHTML = `
                <div class="card">
                    <h1>¡Torneo Finalizado!</h1>
                    <p style="font-size: 20px;">Tu puntuación final: <b>${score}</b></p>
                    <button onclick="window.print()">Descargar Certificado</button>
                    <br><br>
                    <button onclick="location.reload()">Jugar de nuevo</button>
                </div>
            `;
        }
    </script>
</body>
</html>
