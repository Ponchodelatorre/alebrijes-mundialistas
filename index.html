<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alebrijes Mundialistas PRO</title>
    <script src="datos.js?v=2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid #fb923c; width: 80%; max-width: 500px; }
        button { padding: 15px 30px; margin-top: 20px; background: #fb923c; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Alebrijes Mundialistas</h1>
        <div id="ui-area">
            <button onclick="iniciarJuego()">¡Comenzar Torneo!</button>
        </div>
    </div>

    <script>
<script>
    let index = 0;
    let preguntas = bancoPreguntas.base; // Aquí tu base de 50 preguntas

    function iniciarJuego() {
        document.getElementById('game-container').innerHTML = `
            <div id="game-ui"></div>
        `;
        renderizarPregunta();
    }

    function renderizarPregunta() {
        if (index >= preguntas.length) {
            mostrarDashboard();
            return;
        }

        let p = preguntas[index];
        document.getElementById('game-ui').innerHTML = `
            <div class="card">
                <h3>${p.cat} (Nivel ${p.lvl})</h3>
                <p style="font-size: 24px;">${p.q}</p>
                <button id="btn-respuesta" onclick="revelarRespuesta('${p.a}')">Ver Respuesta</button>
                <div id="respuesta-box" style="margin-top: 20px; font-weight: bold; color: #fb923c;"></div>
            </div>
            <p>Pregunta ${index + 1} de ${preguntas.length}</p>
        `;
    }

    function revelarRespuesta(respuesta) {
        document.getElementById('respuesta-box').innerHTML = `Respuesta: ${respuesta} <br> 
            <button onclick="siguientePregunta()" style="background:green;">Siguiente Pregunta</button>`;
        document.getElementById('btn-respuesta').style.display = 'none'; // Ocultar botón ver respuesta
    }

    function siguientePregunta() {
        index++;
        renderizarPregunta();
    }

    function mostrarDashboard() {
        document.getElementById('game-container').innerHTML = `
            <div class="card">
                <h1>¡Torneo Finalizado!</h1>
                <p>Has completado el banco de preguntas.</p>
                <button onclick="window.print()">Descargar Certificado de Participación</button>
                <br><br>
                <button onclick="location.reload()">Jugar de nuevo</button>
            </div>
        `;
    }
</script>
    </script>
</body>
</html>
