<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alebrijes Mundialistas PRO</title>
    <script src="datos.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .branding { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .branding img { height: 50px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; border: 2px solid #fb923c; width: 90%; max-width: 500px; margin: 0 auto; }
        #timer { font-size: 2.5em; color: #fb923c; margin: 10px 0; }
        button { padding: 15px 30px; background: #fb923c; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="branding">
        <img src="logo_24FO_bco_h.png" alt="Logo 1" onerror="this.style.display='none'">
        <img src="My Project Logo.png" alt="Logo 2" onerror="this.style.display='none'">
    </div>

    <div id="game-container">
        <h1>Alebrijes Mundialistas</h1>
        <button class="btn-start" onclick="iniciarJuego()">¡Comenzar Torneo!</button>
    </div>

    <script>
        let index = 0, score = 0, timeLeft = 15, timer;
        let preguntas = bancoPreguntas.base;

        function iniciarJuego() { renderizarPregunta(); }

        function renderizarPregunta() {
            if (index >= preguntas.length) { mostrarDashboard(); return; }
            let p = preguntas[index];
            timeLeft = 15;
            document.getElementById('game-container').innerHTML = `
                <div class="card">
                    <p>Puntos acumulados: ${score}</p>
                    <div id="timer">${timeLeft}</div>
                    <h3>${p.cat}</h3>
                    <p style="font-size: 22px;">${p.q}</p>
                    <button id="btn-res" onclick="revelarRespuesta('${p.a}')">Ver Respuesta</button>
                    <div id="res-box" style="display:none; margin-top:15px;">
                        <p style="color:#fb923c; font-weight:bold;">${p.a}</p>
                        <button onclick="siguiente()">Siguiente Pregunta</button>
                    </div>
                </div>
            `;
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(timer); revelarRespuesta(p.a); }
            }, 1000);
        }

        function revelarRespuesta(a) {
            clearInterval(timer);
            document.getElementById('btn-res').style.display = 'none';
            document.getElementById('res-box').style.display = 'block';
            score += (timeLeft * 10);
        }

        function siguiente() { index++; renderizarPregunta(); }

        function mostrarDashboard() {
            document.getElementById('game-container').innerHTML = `
                <div class="card">
                    <h1>¡Torneo Finalizado!</h1>
                    <p>Puntuación Final: ${score}</p>
                    <button onclick="window.print()">Descargar Certificado</button>
                    <br><br>
                    <button onclick="location.reload()">Jugar de nuevo</button>
                </div>
            `;
        }
    </script>
</body>
</html>
